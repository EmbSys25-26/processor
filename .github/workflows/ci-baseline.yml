name: Semantic API Checks 

on:
  pull_request:
  push:
    branches:
      - main
      - compiler 

jobs:
  semantic:
    name: Semantic API + Memory Safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex

      - name: Run semantic checks
        run: |
          bash scripts/ci/run_semantic_checks.sh .ci_artifacts/semantic_checks

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-logs
          path: .ci_artifacts/semantic_checks
          retention-days: 14
